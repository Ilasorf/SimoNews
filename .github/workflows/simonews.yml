name: SimoNews

on:
  schedule:
    - cron: '0 4 * * *'
    - cron: '0 15 * * *'
    - cron: '0 19 * * *'

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: |
          pip install feedparser jinja2 beautifulsoup4 requests lxml

      - name: Run script
        run: python scripts/fetch_news.py

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
